<!DOCTYPE html>
<html lang="{{ site.lang }}">
{% include head.html %}
<body>

{% include header.html %}

<main>
{{ content }}
</main>

{% include footer.html %}

<!-- =====================================================================
     SCRIPTS
     GSAP/Lenis are loaded because several ported sections still use
     the real template's classes, which assume they're present. If a
     future page audit finds nothing actually depends on GSAP anymore,
     it can be dropped -- it's not doing anything on its own without
     matching data-w-id interactions, which this build doesn't use.
===================================================================== -->
<script src="https://unpkg.com/lenis@1.2.3/dist/lenis.min.js"></script>
<script src="{{ '/assets/js/navbar.js' | relative_url }}"></script>
<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
{% if page.extra_js %}
  {% for script in page.extra_js %}
    <script src="{{ script | relative_url }}"></script>
  {% endfor %}
{% endif %}

</body>
</html>
